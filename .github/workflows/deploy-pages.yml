name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.8
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Compute base href
        id: base_href
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner="${GITHUB_REPOSITORY_OWNER}"
          if [[ "$repo_name" == "${owner}.github.io" ]]; then
            echo "prod=/" >> "$GITHUB_OUTPUT"
            echo "demo=/demo/" >> "$GITHUB_OUTPUT"
            echo "prod_url=https://${owner}.github.io/" >> "$GITHUB_OUTPUT"
            echo "demo_url=https://${owner}.github.io/demo/" >> "$GITHUB_OUTPUT"
          else
            echo "prod=/$repo_name/" >> "$GITHUB_OUTPUT"
            echo "demo=/$repo_name/demo/" >> "$GITHUB_OUTPUT"
            echo "prod_url=https://${owner}.github.io/$repo_name/" >> "$GITHUB_OUTPUT"
            echo "demo_url=https://${owner}.github.io/$repo_name/demo/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build active web app
        run: >
          flutter build web --release
          --base-href "${{ steps.base_href.outputs.prod }}"
          --dart-define=APP_FLAVOR=prod
          --dart-define=PUBLIC_APP_URL=${{ steps.base_href.outputs.prod_url }}

      - name: Assemble Pages artifact root
        shell: bash
        run: |
          rm -rf build/site
          mkdir -p build/site
          cp -R build/web/. build/site/

      - name: Build demo web app
        run: >
          flutter build web --release
          --base-href "${{ steps.base_href.outputs.demo }}"
          --dart-define=APP_FLAVOR=demo
          --dart-define=PUBLIC_APP_URL=${{ steps.base_href.outputs.demo_url }}

      - name: Assemble demo artifact
        shell: bash
        run: |
          mkdir -p build/site/demo
          cp -R build/web/. build/site/demo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
